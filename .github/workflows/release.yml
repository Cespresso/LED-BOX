name: Release & Deploy Installer

# v1.0.0 のようなタグを push すると起動する
on:
  push:
    tags:
      - "v*"
  # 手動実行も可能（Pages の動作確認用。Release は作られない）
  workflow_dispatch:

permissions:
  contents: write   # Release の作成・アセット添付
  pages: write      # GitHub Pages へのデプロイ
  id-token: write   # Pages デプロイの OIDC 認証

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ───────────────────────────────────────────────
  # 1. ファームウェアをビルドして merged.bin を生成・Release 添付
  # ───────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # esp-rs 公式アクション。esp toolchain / riscv32imc ターゲット / ldproxy を
      # セットアップする（ESP-IDF 本体は cargo build 時に esp-idf-sys が取得）
      - name: Install Rust ESP toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32c3
          ldproxy: true

      # cargo registry / target / ESP-IDF キャッシュをまとめて面倒みる
      - name: Cache build
        uses: Swatinem/rust-cache@v2
        with:
          cache-directories: |
            .embuild
            ~/.espressif

      - name: Build (release)
        run: cargo build --release

      - name: Install espflash
        run: cargo install espflash --locked

      # bootloader + partition table + app を 1 ファイルに結合
      # espflash の同梱 bootloader/partition を使う。NVS 周りで問題が出たら
      # ESP-IDF が生成した bootloader.bin / partition-table.bin を --bootloader /
      # --partition-table で明示指定する。
      - name: Generate merged firmware
        run: |
          espflash save-image \
            --chip esp32c3 \
            --merge \
            --flash-size 4mb \
            target/riscv32imc-esp-espidf/release/led-box \
            led-box-merged.bin
          ls -lh led-box-merged.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: led-box-merged
          path: led-box-merged.bin

      # タグ push のときだけ Release を作成して bin を添付
      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: led-box-merged.bin
          generate_release_notes: true

  # ───────────────────────────────────────────────
  # 2. docs/ を GitHub Pages にデプロイ（インストーラページ）
  # ───────────────────────────────────────────────
  deploy-pages:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
