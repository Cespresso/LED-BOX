name: Release & Deploy Installer

# v1.0.0 のようなタグを push すると起動する
on:
  push:
    tags:
      - "v*"
  # 手動実行も可能（Pages の動作確認用。Release は作られない）
  workflow_dispatch:

permissions:
  contents: write   # Release の作成・アセット添付
  pages: write      # GitHub Pages へのデプロイ
  id-token: write   # Pages デプロイの OIDC 認証

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ───────────────────────────────────────────────
  # 1. ファームウェアをビルドして merged.bin を生成・Release 添付
  # ───────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    # Rust + ESP-IDF + riscv32imc ツールチェインが全部入った公式イメージ
    container:
      image: espressif/idf-rust:all_latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # コンテナ内の esp toolchain / cargo を PATH に通す
      - name: Setup environment
        run: |
          echo "${HOME}/.rustup/toolchains/esp/bin" >> "$GITHUB_PATH"
          echo "${HOME}/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Build (release)
        run: cargo build --release

      - name: Install espflash
        run: cargo install espflash --locked

      # bootloader + partition table + app を 1 ファイルに結合
      # espflash の同梱 bootloader/partition を使う。NVS 周りで問題が出たら
      # ESP-IDF が生成した bootloader.bin / partition-table.bin を --bootloader /
      # --partition-table で明示指定する。
      - name: Generate merged firmware
        run: |
          espflash save-image \
            --chip esp32c3 \
            --merge \
            --flash-size 4mb \
            target/riscv32imc-esp-espidf/release/led-box \
            led-box-merged.bin
          ls -lh led-box-merged.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: led-box-merged
          path: led-box-merged.bin

      # タグ push のときだけ Release を作成して bin を添付
      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: led-box-merged.bin
          generate_release_notes: true

  # ───────────────────────────────────────────────
  # 2. docs/ を GitHub Pages にデプロイ（インストーラページ）
  # ───────────────────────────────────────────────
  deploy-pages:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
